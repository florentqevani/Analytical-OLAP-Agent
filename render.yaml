services:
  - type: web
    name: analytical-olap-agent-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: sh api/entrypoint.sh
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: WAREHOUSE_DB_PATH
        value: retail_warehouse.duckdb
      - key: HISTORY_DB_PATH
        value: agent_history.duckdb
      - key: CSV_PATH
        value: global_retail_sales.csv
