services:
  - type: web
    name: analytical-olap-agent-api
    env: python
    plan: free
    disk:
      name: analytical-olap-agent-data
      mountPath: /var/data
      sizeGB: 1
    buildCommand: pip install -r requirements.txt
    startCommand: sh api/entrypoint.sh
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://superb-tiramisu-dcfab1.netlify.app,http://localhost:5173,http://localhost:3000
      - key: WAREHOUSE_DB_PATH
        value: /var/data/retail_warehouse.duckdb
      - key: HISTORY_DB_PATH
        value: /var/data/agent_history.duckdb
      - key: CSV_PATH
        value: global_retail_sales.csv
