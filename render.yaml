services:
  - type: web
    name: analytical-olap-agent-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: sh api/entrypoint.sh
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: analytical-olap-agent-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: WAREHOUSE_DB_PATH
        value: data/retail_warehouse.duckdb
      - key: HISTORY_DB_PATH
        value: data/agent_history.duckdb
      - key: CSV_PATH
        value: global_retail_sales.csv

  - type: web
    name: analytical-olap-agent-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: analytical-olap-agent-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
