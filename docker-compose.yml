services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - .env
    environment:
      PORT: 8000
      WAREHOUSE_DB_PATH: /app/data/retail_warehouse.duckdb
      HISTORY_DB_PATH: /app/data/agent_history.duckdb
      CSV_PATH: /app/global_retail_sales.csv
      CORS_ORIGINS: http://localhost:${FRONTEND_HOST_PORT:-5174},http://127.0.0.1:${FRONTEND_HOST_PORT:-5174},http://localhost:5174,http://127.0.0.1:5174,http://localhost:${API_HOST_PORT:-8001},http://127.0.0.1:${API_HOST_PORT:-8001}
    ports:
      - "${API_HOST_PORT:-8001}:8000"
    volumes:
      - duckdb_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE: http://localhost:${API_HOST_PORT:-8001}
    depends_on:
      - api
    ports:
      - "${FRONTEND_HOST_PORT:-5174}:5174"
    restart: unless-stopped

volumes:
  duckdb_data:
